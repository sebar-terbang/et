<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Don't Break the Chain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #52b788;
    --accent-dim: rgba(82, 183, 136, 0.12);
    --text: #e8f0eb;
    --muted: #6a7a6e;
    --done-bg: #0d1f14;
    --done-text: #52b788;
    --chain-color: #52b788;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  header {
    padding: 2rem 2.5rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    letter-spacing: 0.04em;
    line-height: 1;
    color: var(--text);
  }

  .logo span { color: #74c69d; }

  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.5rem;
  }

  .streak-badge {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 100px;
    padding: 0.4rem 1rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.08em;
    color: var(--accent);
  }

  .streak-badge .fire { font-size: 1.3rem; }

  .view-toggle {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .view-btn {
    padding: 0.4rem 1.1rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .view-btn.active {
    background: var(--accent);
    color: #fff;
  }

  .main { padding: 2rem 2.5rem; max-width: 1000px; }

  .nav-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .nav-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.06em;
    color: var(--text);
  }

  .nav-arrows { display: flex; gap: 8px; }

  .nav-btn {
    width: 36px; height: 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s, background 0.15s;
  }

  .nav-btn:hover { border-color: var(--accent); background: var(--accent-dim); }

  .day-headers {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 4px;
  }

  .day-header {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    padding: 0.4rem 0;
    text-transform: uppercase;
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .day-cell {
    aspect-ratio: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    user-select: none;
    overflow: hidden;
  }

  .day-cell:hover:not(.empty):not(.future) {
    border-color: var(--accent);
    background: var(--accent-dim);
    transform: scale(1.04);
  }

  .day-cell.empty { background: transparent; border-color: transparent; cursor: default; }
  .day-cell.future { opacity: 0.25; cursor: not-allowed; }
  .day-cell.today { border-color: #888; }

  .day-cell.done {
    background: var(--done-bg);
    border-color: var(--accent);
  }

  .day-num {
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.75rem, 2vw, 1rem);
    font-weight: 500;
    color: var(--text);
    position: relative;
    z-index: 1;
  }

  .day-cell.done .day-num {
    color: var(--done-text);
  }

  .strikethrough {
    position: absolute;
    width: 70%;
    height: 2px;
    background: var(--accent);
    border-radius: 2px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scaleX(0);
    transform-origin: left;
    transition: transform 0.2s ease;
    z-index: 2;
  }

  .day-cell.done .strikethrough { transform: translate(-50%, -50%) scaleX(1); }

  .chain-connector {
    position: absolute;
    background: var(--chain-color);
    opacity: 0.35;
    z-index: 0;
  }

  .chain-connector.right { top: 50%; right: -4px; width: 8px; height: 3px; transform: translateY(-50%); }
  .chain-connector.left  { top: 50%; left: -4px; width: 8px; height: 3px; transform: translateY(-50%); }

  .today-dot {
    position: absolute;
    bottom: 5px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.7;
  }

  /* WEEKLY VIEW */
  .week-view { display: none; }
  .week-view.visible { display: block; }
  .month-view { display: block; }
  .month-view.hidden { display: none; }

  .week-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }

  .week-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.2rem 0.8rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    user-select: none;
    position: relative;
    overflow: hidden;
    min-height: 100px;
  }

  .week-cell:hover:not(.future) {
    border-color: var(--accent);
    background: var(--accent-dim);
    transform: translateY(-2px);
  }

  .week-cell.future { opacity: 0.25; cursor: not-allowed; }
  .week-cell.today { border-color: #888; }

  .week-cell.done {
    background: var(--done-bg);
    border-color: var(--accent);
  }

  .week-day-name {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .week-cell.done .week-day-name { color: var(--accent); opacity: 0.7; }

  .week-date-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    line-height: 1;
    color: var(--text);
    position: relative;
  }

  .week-cell.done .week-date-num { color: var(--accent); }

  .week-strike {
    position: absolute;
    width: 60%;
    height: 2.5px;
    background: var(--accent);
    border-radius: 2px;
    top: 54%;
    left: 50%;
    transform: translate(-50%, -50%) scaleX(0);
    transform-origin: left;
    transition: transform 0.2s ease;
  }

  .week-cell.done .week-strike { transform: translate(-50%, -50%) scaleX(1); }

  .week-check {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem;
    color: transparent;
    transition: all 0.15s;
  }

  .week-cell.done .week-check {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .stats-row {
    display: flex;
    gap: 12px;
    margin-top: 2rem;
    flex-wrap: wrap;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.5rem;
    flex: 1;
    min-width: 120px;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.04em;
    color: var(--accent);
    line-height: 1;
  }

  .hint {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 1.5rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
  }

  @media (max-width: 600px) {
    header {
      padding: 1rem 1rem 0.8rem;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.75rem;
    }
    .header-right {
      width: 100%;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
    }
    .logo { font-size: 1.8rem; }
    .streak-badge { font-size: 0.85rem; padding: 0.3rem 0.75rem; }
    .streak-badge .fire { font-size: 1rem; }
    .main { padding: 0.9rem 1rem; }
    .nav-label { font-size: 1.1rem; }
    .nav-btn { width: 30px; height: 30px; font-size: 0.85rem; }
    .day-header { font-size: 0.6rem; padding: 0.25rem 0; }
    .calendar-grid { gap: 3px; }
    .day-headers { gap: 3px; }
    .day-cell { border-radius: 7px; }
    .day-num { font-size: 0.7rem; }
    .today-dot { width: 3px; height: 3px; bottom: 3px; }
    .week-row { grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .week-cell { padding: 0.7rem 0.4rem; min-height: 70px; border-radius: 10px; }
    .week-date-num { font-size: 1.6rem; }
    .week-day-name { font-size: 0.6rem; }
    .week-check { width: 20px; height: 20px; font-size: 0.7rem; }
    .stats-row { gap: 8px; margin-top: 1.2rem; }
    .stat-card { padding: 0.75rem 1rem; min-width: 0; }
    .stat-value { font-size: 1.6rem; }
    .stat-label { font-size: 0.62rem; }
    .hint { font-size: 0.68rem; margin-top: 1rem; }
  }
  @media (max-width: 380px) {
    .calendar-grid { gap: 2px; }
    .day-headers { gap: 2px; }
    .day-num { font-size: 0.62rem; }
    .week-row { grid-template-columns: repeat(4, 1fr); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Don't Break<br><span>The Chain</span></div>
  <div class="header-right">
    <div class="streak-badge">
      <span class="fire">🔥</span>
      <span id="streakCount">0</span> HARI BERTURUT
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="btnMonthly" onclick="setView('monthly')">Bulanan</button>
      <button class="view-btn" id="btnWeekly" onclick="setView('weekly')">Mingguan</button>
    </div>
  </div>
</header>

<div class="main">
  <div class="nav-bar">
    <div class="nav-arrows">
      <button class="nav-btn" onclick="navigate(-1)">&#8592;</button>
    </div>
    <div class="nav-label" id="navLabel"></div>
    <div class="nav-arrows">
      <button class="nav-btn" onclick="navigate(1)">&#8594;</button>
    </div>
  </div>

  <!-- MONTHLY VIEW -->
  <div class="month-view" id="monthView">
    <div class="day-headers" id="dayHeaders"></div>
    <div class="calendar-grid" id="calendarGrid"></div>
  </div>

  <!-- WEEKLY VIEW -->
  <div class="week-view" id="weekView">
    <div class="week-row" id="weekRow"></div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Streak Saat Ini</div>
      <div class="stat-value" id="statCurrent">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Streak Terpanjang</div>
      <div class="stat-value" id="statBest">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Hari Selesai</div>
      <div class="stat-value" id="statTotal">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Bulan Ini</div>
      <div class="stat-value" id="statMonth">0</div>
    </div>
  </div>

  <div class="hint">↑ Klik tanggal untuk menandai selesai &mdash; angka akan tercoret</div>
</div>

<script>
const DAYS_ID = ['MIN','SEN','SEL','RAB','KAM','JUM','SAB'];
const MONTHS_ID = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

let markedDays = JSON.parse(localStorage.getItem('dbtc_marked') || '{}');
let currentView = 'monthly';
let today = new Date();
let cursor = new Date(today.getFullYear(), today.getMonth(), 1);
let weekCursor = getMonday(today);

function getMonday(d) {
  const date = new Date(d);
  const day = date.getDay();
  const diff = (day === 0) ? -6 : 1 - day;
  date.setDate(date.getDate() + diff);
  date.setHours(0,0,0,0);
  return date;
}

function dateKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function todayKey() {
  return dateKey(today.getFullYear(), today.getMonth(), today.getDate());
}

function isFuture(y, m, d) {
  const t = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const cell = new Date(y, m, d);
  return cell > t;
}

function isToday(y, m, d) {
  return y === today.getFullYear() && m === today.getMonth() && d === today.getDate();
}

function toggleDay(key) {
  if (markedDays[key]) {
    delete markedDays[key];
  } else {
    markedDays[key] = true;
  }
  localStorage.setItem('dbtc_marked', JSON.stringify(markedDays));
  render();
}

function calcStats() {
  const keys = Object.keys(markedDays).filter(k => markedDays[k]).sort();
  const total = keys.length;
  let best = 0, current = 0, streak = 0;
  let prev = null;
  for (let k of keys) {
    if (prev) {
      const d1 = new Date(prev); const d2 = new Date(k);
      const diff = (d2 - d1) / 86400000;
      if (diff === 1) { streak++; } else { streak = 1; }
    } else { streak = 1; }
    if (streak > best) best = streak;
    prev = k;
  }
  const tk = todayKey();
  const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
  const yk = dateKey(yesterday.getFullYear(), yesterday.getMonth(), yesterday.getDate());
  if (markedDays[tk]) {
    let cur = 1, d = new Date(today);
    while (true) {
      d.setDate(d.getDate()-1);
      const k2 = dateKey(d.getFullYear(), d.getMonth(), d.getDate());
      if (markedDays[k2]) { cur++; } else break;
    }
    current = cur;
  } else if (markedDays[yk]) {
    let cur = 1, d = new Date(yesterday);
    while (true) {
      d.setDate(d.getDate()-1);
      const k2 = dateKey(d.getFullYear(), d.getMonth(), d.getDate());
      if (markedDays[k2]) { cur++; } else break;
    }
    current = cur;
  }
  const monthKeys = keys.filter(k => {
    const p = k.split('-');
    return parseInt(p[0]) === today.getFullYear() && parseInt(p[1])-1 === today.getMonth();
  });
  return { total, best, current, month: monthKeys.length };
}

function renderMonthly() {
  const year = cursor.getFullYear(), month = cursor.getMonth();
  document.getElementById('navLabel').textContent = `${MONTHS_ID[month]} ${year}`;
  const headers = document.getElementById('dayHeaders');
  headers.innerHTML = DAYS_ID.map(d => `<div class="day-header">${d}</div>`).join('');
  const grid = document.getElementById('calendarGrid');
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  let html = '';
  for (let i = 0; i < firstDay; i++) html += `<div class="day-cell empty"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const key = dateKey(year, month, d);
    const done = !!markedDays[key];
    const future = isFuture(year, month, d);
    const tod = isToday(year, month, d);
    let cls = 'day-cell';
    if (done) cls += ' done';
    if (future) cls += ' future';
    if (tod) cls += ' today';
    const onclick = future ? '' : `onclick="toggleDay('${key}')"`;
    const dot = tod ? `<div class="today-dot"></div>` : '';
    html += `<div class="${cls}" ${onclick}>
      <div class="strikethrough"></div>
      <span class="day-num">${d}</span>
      ${dot}
    </div>`;
  }
  grid.innerHTML = html;
}

function renderWeekly() {
  const row = document.getElementById('weekRow');
  let html = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekCursor);
    d.setDate(d.getDate() + i);
    const key = dateKey(d.getFullYear(), d.getMonth(), d.getDate());
    const done = !!markedDays[key];
    const future = isFuture(d.getFullYear(), d.getMonth(), d.getDate());
    const tod = isToday(d.getFullYear(), d.getMonth(), d.getDate());
    let cls = 'week-cell';
    if (done) cls += ' done';
    if (future) cls += ' future';
    if (tod) cls += ' today';
    const onclick = future ? '' : `onclick="toggleDay('${key}')"`;
    const weekStart = getMonday(weekCursor);
    const weekEnd = new Date(weekStart); weekEnd.setDate(weekEnd.getDate()+6);
    const dayName = DAYS_ID[d.getDay()];
    html += `<div class="${cls}" ${onclick}>
      <div class="week-day-name">${dayName}</div>
      <div style="position:relative">
        <div class="week-date-num">${d.getDate()}</div>
        <div class="week-strike"></div>
      </div>
      <div class="week-check">${done ? '✓' : ''}</div>
    </div>`;
  }
  const ws = new Date(weekCursor);
  const we = new Date(weekCursor); we.setDate(we.getDate()+6);
  const sameMonth = ws.getMonth() === we.getMonth();
  const label = sameMonth
    ? `${ws.getDate()}–${we.getDate()} ${MONTHS_ID[ws.getMonth()]} ${ws.getFullYear()}`
    : `${ws.getDate()} ${MONTHS_ID[ws.getMonth()]} – ${we.getDate()} ${MONTHS_ID[we.getMonth()]} ${we.getFullYear()}`;
  document.getElementById('navLabel').textContent = label;
  row.innerHTML = html;
}

function renderStats() {
  const s = calcStats();
  document.getElementById('streakCount').textContent = s.current;
  document.getElementById('statCurrent').textContent = s.current;
  document.getElementById('statBest').textContent = s.best;
  document.getElementById('statTotal').textContent = s.total;
  document.getElementById('statMonth').textContent = s.month;
}

function render() {
  if (currentView === 'monthly') renderMonthly();
  else renderWeekly();
  renderStats();
}

function setView(v) {
  currentView = v;
  document.getElementById('monthView').classList.toggle('hidden', v !== 'monthly');
  document.getElementById('weekView').classList.toggle('visible', v === 'weekly');
  document.getElementById('btnMonthly').classList.toggle('active', v === 'monthly');
  document.getElementById('btnWeekly').classList.toggle('active', v === 'weekly');
  render();
}

function navigate(dir) {
  if (currentView === 'monthly') {
    cursor.setMonth(cursor.getMonth() + dir);
  } else {
    weekCursor.setDate(weekCursor.getDate() + dir * 7);
  }
  render();
}

render();
</script>
</body>
</html>
