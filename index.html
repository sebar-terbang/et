<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>chain.</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Syne+Mono&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #eeece6;
  --border: #e4e1d8;
  --text: #1c1b18;
  --muted: #95928a;
  --accent: #2c5f3f;
  --accent-light: #e8f2eb;
  --accent2: #3d7a55;
  --gold: #a87020;
  --gold-light: #fdf4e3;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 3px 12px rgba(0,0,0,0.05);
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Manrope',sans-serif;
  min-height:100vh;
  padding-bottom:48px;
}

.app{max-width:430px;margin:0 auto;padding:0 16px}

/* TOP BAR */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:22px 0 14px;
}
.brand{
  font-family:'Syne',sans-serif;font-weight:800;font-size:20px;
  letter-spacing:-0.5px;color:var(--text);
}
.brand em{color:var(--accent);font-style:normal}
.icon-btn{
  width:38px;height:38px;border-radius:50%;border:1.5px solid var(--border);
  background:var(--surface);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:15px;box-shadow:var(--shadow);transition:border-color .2s;
}
.icon-btn:hover{border-color:var(--accent)}

/* ── CHAIN CALENDAR CARD ── */
.card{
  background:var(--surface);border-radius:var(--radius);
  box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden;
}
.card-pad{padding:18px}

.chain-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px 14px;
}
.chain-left{display:flex;align-items:center;gap:10px}
.chain-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px}
.streak-pill{
  background:var(--accent);color:#fff;
  font-family:'Syne Mono',monospace;font-size:11px;
  padding:3px 9px;border-radius:20px;
}

.view-toggle{
  display:flex;background:var(--surface2);border-radius:8px;padding:3px;gap:2px;
}
.tog{
  font-family:'Manrope',sans-serif;font-size:11px;font-weight:600;
  padding:4px 11px;border:none;background:transparent;color:var(--muted);
  border-radius:6px;cursor:pointer;transition:all .2s;
}
.tog.on{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* month nav */
.month-nav{
  display:none;align-items:center;justify-content:space-between;
  padding:10px 18px;border-top:1px solid var(--border);
}
.month-nav.show{display:flex}
.month-lbl{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;letter-spacing:.3px}
.mnav{display:flex;gap:6px}
.mnav-btn{
  width:30px;height:30px;border-radius:8px;border:1.5px solid var(--border);
  background:transparent;color:var(--text);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.mnav-btn:hover{border-color:var(--accent);color:var(--accent)}

/* calendar grid */
.cal-wrap{padding:14px 14px 0}
.cal-labels{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.cl{
  text-align:center;font-family:'Syne Mono',monospace;font-size:9px;
  letter-spacing:.5px;color:var(--muted);text-transform:uppercase;padding:3px 0 8px;
}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}

.cc{
  aspect-ratio:1;border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-family:'Syne Mono',monospace;font-size:12px;color:var(--muted);
  position:relative;transition:all .15s;user-select:none;
}
.cc.in{color:var(--text)}
.cc.dim{color:#ccc9be}

/* chain day — green X mark */
.cc.chain{
  background:var(--accent-light);
}
.cc.chain::after{
  content:'✕';
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:var(--accent);
}

/* milestone day overrides color */
.cc.chain.ms-day::after{color:var(--gold)}
.cc.chain.ms-day{background:var(--gold-light)}

/* today ring */
.cc.today{border:2px solid var(--accent)}
.cc.today::before{
  content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
  width:3px;height:3px;border-radius:50%;background:var(--accent);
}
.cc.chain.today::after{background:transparent}

.cc.fut{opacity:.3}

/* CHECK IN */
.checkin-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-top:1px solid var(--border);
  margin-top:4px;
}
.ci-status{display:flex;align-items:center;gap:8px}
.ci-dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0}
.ci-dot.on{background:var(--accent)}
.ci-txt{font-size:12px;font-weight:500;color:var(--muted)}
.ci-txt.on{color:var(--accent)}
.ci-btn{
  font-family:'Syne',sans-serif;font-weight:700;font-size:12px;
  padding:9px 18px;border-radius:9px;border:none;cursor:pointer;transition:all .2s;
}
.ci-btn.go{background:var(--accent);color:#fff}
.ci-btn.go:active{transform:scale(.97)}
.ci-btn.done{background:var(--accent-light);color:var(--accent);cursor:default}

/* ── COUNTER ── */
.counter-inner{
  display:flex;align-items:flex-end;justify-content:space-between;
  padding:20px 18px 16px;
}
.big-num{
  font-family:'Syne',sans-serif;font-weight:800;font-size:62px;
  line-height:1;letter-spacing:-2px;color:var(--text);
}
.big-unit{font-size:13px;color:var(--muted);font-weight:500;margin-top:4px}
.meta-stats{display:flex;flex-direction:column;gap:12px;align-items:flex-end;padding-bottom:4px}
.ms-val{font-family:'Syne Mono',monospace;font-size:17px;color:var(--text);text-align:right}
.ms-lbl{font-size:10px;color:var(--muted);text-align:right;margin-top:1px}

.start-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px;border-top:1px solid var(--border);
}
.start-lbl{font-size:12px;color:var(--muted)}
.start-lbl strong{color:var(--text);font-weight:600}
.btns{display:flex;gap:7px}
.act-btn{
  font-family:'Manrope',sans-serif;font-size:11px;font-weight:700;
  padding:7px 13px;border-radius:8px;border:1.5px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;
}
.act-btn.set{border-color:var(--accent);color:var(--accent)}
.act-btn.set:hover{background:var(--accent);color:#fff}
.act-btn:hover{border-color:var(--text);color:var(--text)}

/* ── NEXT MILESTONE ── */
.next-ms-card{
  background:var(--surface);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:16px 18px;margin-bottom:12px;
  border-left:3px solid var(--gold);
  animation:fadeUp .4s ease .1s both;
}
.nms-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.nms-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
.nms-name{font-family:'Syne',sans-serif;font-weight:700;font-size:16px}
.nms-days{font-family:'Syne Mono',monospace;font-size:12px;color:var(--muted)}
.prog-track{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),#d4960a);border-radius:2px;transition:width .6s ease}

/* ── MILESTONES LIST ── */
.sec-label{
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);margin-bottom:8px;animation:fadeUp .4s ease .15s both;
}
.ms-list{display:flex;flex-direction:column;gap:7px;animation:fadeUp .4s ease .2s both}

.ms-item{
  background:var(--surface);border-radius:var(--radius-sm);
  box-shadow:var(--shadow);padding:12px 15px;
  display:flex;align-items:center;gap:13px;
}
.ms-item.done{border-left:3px solid var(--accent)}
.ms-item.next{border-left:3px solid var(--gold);background:linear-gradient(90deg,var(--gold-light) 0%,var(--surface) 60%)}

.ms-ico{font-size:22px;width:30px;text-align:center;flex-shrink:0}
.ms-txt{flex:1;min-width:0}
.ms-t{font-family:'Syne',sans-serif;font-weight:700;font-size:13px}
.ms-d{font-size:11px;color:var(--muted);margin-top:1px}
.ms-n{font-family:'Syne Mono',monospace;font-size:13px;color:var(--muted);white-space:nowrap}
.ms-item.done .ms-n{color:var(--accent)}
.ms-item.next .ms-n{color:var(--gold)}
.ms-ck{
  width:22px;height:22px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:10px;
}
.ms-ck.y{background:var(--accent);color:#fff}
.ms-ck.n{border:1.5px solid var(--border)}

/* ── BOTTOM SHEET / MODAL ── */
.overlay{
  position:fixed;inset:0;background:rgba(15,14,12,.5);
  backdrop-filter:blur(5px);z-index:100;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.overlay.open{opacity:1;pointer-events:all}
.sheet{
  background:var(--surface);border-radius:22px 22px 0 0;
  padding:26px 22px 44px;width:100%;max-width:430px;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.overlay.open .sheet{transform:translateY(0)}
.handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 22px}
.sheet-title{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;margin-bottom:6px}
.sheet-sub{font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.5}
.date-input{
  width:100%;background:var(--surface2);border:1.5px solid var(--border);
  border-radius:10px;font-family:'Syne Mono',monospace;font-size:15px;
  color:var(--text);padding:13px 15px;margin-bottom:14px;
  outline:none;transition:border-color .2s;-webkit-appearance:none;
}
.date-input:focus{border-color:var(--accent)}
.sheet-btns{display:flex;gap:10px}
.s-btn{
  flex:1;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;
  padding:13px;border-radius:10px;border:none;cursor:pointer;transition:all .2s;
}
.s-btn.pri{background:var(--accent);color:#fff}
.s-btn.pri:hover{background:var(--accent2)}
.s-btn.sec{background:var(--surface2);color:var(--muted)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(120px);
  background:var(--text);color:#fff;border-radius:12px;
  padding:11px 20px;font-size:13px;font-weight:600;z-index:200;
  display:flex;align-items:center;gap:9px;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 4px 20px rgba(0,0,0,.2);white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}
.t-ico{font-size:17px}

/* ── QUOTE ── */
.quote-wrap{
  background:var(--surface);border-radius:var(--radius-sm);
  padding:14px 16px;margin-top:4px;
  animation:fadeUp .4s ease .25s both;
}
.quote-txt{font-size:12px;color:var(--muted);font-style:italic;line-height:1.65}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
.card{animation:fadeUp .4s ease both}
.counter-card{animation:fadeUp .4s ease .05s both}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand">chain<em>.</em></div>
  </div>

  <!-- CHAIN CALENDAR -->
  <div class="card">
    <div class="chain-top">
      <div class="chain-left">
        <div class="chain-title">Don't Break the Chain</div>
        <div class="streak-pill" id="streakPill">0h</div>
      </div>
      <div class="view-toggle">
        <button class="tog on" id="togWeek" onclick="setView('week')">Minggu</button>
        <button class="tog" id="togMonth" onclick="setView('month')">Bulan</button>
      </div>
    </div>

    <div class="month-nav" id="monthNav">
      <div class="month-lbl" id="monthLbl"></div>
      <div class="mnav">
        <button class="mnav-btn" onclick="changeMonth(-1)">‹</button>
        <button class="mnav-btn" onclick="changeMonth(1)">›</button>
      </div>
    </div>

    <div class="cal-wrap">
      <div class="cal-labels" id="calLabels"></div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <div class="checkin-bar">
      <div class="ci-status">
        <div class="ci-dot" id="ciDot"></div>
        <div class="ci-txt" id="ciTxt">Belum check in hari ini</div>
      </div>
      <button class="ci-btn go" id="ciBtn" onclick="doCheckIn()">✓ Check In</button>
    </div>
  </div>

  <!-- COUNTER -->
  <div class="card counter-card">
    <div class="counter-inner">
      <div>
        <div class="big-num" id="bigNum">0</div>
        <div class="big-unit">hari streak</div>
      </div>
      <div class="meta-stats">
        <div>
          <div class="ms-val" id="hoursVal">0</div>
          <div class="ms-lbl">jam total</div>
        </div>
        <div>
          <div class="ms-val" id="bestVal">0</div>
          <div class="ms-lbl">best streak</div>
        </div>
      </div>
    </div>
    <div class="start-bar">
      <div class="start-lbl">Mulai: <strong id="startLbl">—</strong></div>
    </div>
  </div>

  <!-- NEXT MILESTONE -->
  <div class="next-ms-card">
    <div class="nms-label">Next Milestone</div>
    <div class="nms-row">
      <div class="nms-name" id="nmsName">—</div>
      <div class="nms-days" id="nmsDays">—</div>
    </div>
    <div class="prog-track"><div class="prog-fill" id="nmsFill" style="width:0%"></div></div>
  </div>

  <!-- MILESTONES -->
  <div class="sec-label">Milestones</div>
  <div class="ms-list" id="msList"></div>

  <div class="quote-wrap">
    <div class="quote-txt" id="quoteEl"></div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title">Set Tanggal Mulai</div>
    <div class="sheet-sub">Pilih tanggal pertama kamu mulai streak ini. Kalau baru mulai hari ini, pilih hari ini aja.</div>
    <input type="date" class="date-input" id="dateInput">
    <div class="sheet-btns">
      <button class="s-btn pri" onclick="saveDate()">Simpan</button>
      <button class="s-btn sec" onclick="closeModal()">Batal</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <span class="t-ico" id="tIco">✓</span>
  <span id="tMsg">Check in berhasil!</span>
</div>

<script>
const MILESTONES = [
  {days:2,  title:'Awal Mula',      badge:'🌱',desc:'Langkah pertama diambil'},
  {days:3,  title:'Tiga Hari',       badge:'✊',desc:'Urge pertama dikalahkan'},
  {days:5,  title:'Lima Hari',       badge:'⚡',desc:'Momentum terbentuk'},
  {days:7,  title:'Satu Minggu',     badge:'🔥',desc:'Minggu pertama selesai'},
  {days:14, title:'Dua Minggu',      badge:'💪',desc:'Kebiasaan mulai berubah'},
  {days:21, title:'Habit Loop',      badge:'🧠',desc:'21 hari, habit terbentuk'},
  {days:30, title:'Satu Bulan',      badge:'🥈',desc:'Silver milestone'},
  {days:45, title:'45 Hari',         badge:'⚔️',desc:'Warrior mindset'},
  {days:60, title:'Dua Bulan',       badge:'🏅',desc:'Konsisten bro'},
  {days:90, title:'90 Hari',         badge:'🏆',desc:'The real deal'},
  {days:120,title:'Empat Bulan',     badge:'💎',desc:'Diamond tier'},
  {days:180,title:'Setengah Tahun',  badge:'👑',desc:'Legenda'},
  {days:365,title:'Satu Tahun',      badge:'🌟',desc:'GOAT status'},
];

const QUOTES = [
  'Disiplin adalah jembatan antara tujuan dan pencapaian.',
  'Urge itu seperti gelombang — datang, lalu pergi. Kamu lebih kuat.',
  'Setiap hari yang kamu tahan adalah versi baru yang lebih baik.',
  'Otakmu sedang rewire. Prosesnya nyata. Terus.',
  'Satu keputusan kecil hari ini mengubah segalanya besok.',
];

let startDate = null;
let bestStreak = 0;
let checkedInDates = new Set();
let shownMilestones = new Set();
let calMonth = new Date();
let view = 'week';

const ds = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const todayStr = () => ds(new Date());

function load() {
  const sd = localStorage.getItem('c_start');
  if (sd) { startDate = new Date(sd); startDate.setHours(0,0,0,0); }
  bestStreak = parseInt(localStorage.getItem('c_best')||'0');
  const ci = localStorage.getItem('c_ci'); if (ci) checkedInDates = new Set(JSON.parse(ci));
  const sm = localStorage.getItem('c_ms'); if (sm) shownMilestones = new Set(JSON.parse(sm));
}

function save() {
  if (startDate) localStorage.setItem('c_start', startDate.toISOString());
  localStorage.setItem('c_best', bestStreak);
  localStorage.setItem('c_ci', JSON.stringify([...checkedInDates]));
  localStorage.setItem('c_ms', JSON.stringify([...shownMilestones]));
}

function getDays() {
  if (!startDate) return 0;
  const n = new Date(); n.setHours(0,0,0,0);
  return Math.max(0, Math.floor((n - startDate) / 86400000));
}
function getHours() {
  if (!startDate) return 0;
  return Math.max(0, Math.floor((Date.now() - startDate) / 3600000));
}

function isChainDay(dateStr) {
  if (!startDate) return false;
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  const sd = new Date(startDate);
  const td = new Date(); td.setHours(0,0,0,0);
  return d >= sd && d <= td;
}

function getMilestoneDays() {
  const s = new Set();
  if (!startDate) return s;
  MILESTONES.forEach(m => {
    const md = new Date(startDate);
    md.setDate(md.getDate() + m.days);
    s.add(ds(md));
  });
  return s;
}

function renderAll() {
  const days = getDays();
  if (days > bestStreak) { bestStreak = days; save(); }

  document.getElementById('bigNum').textContent = days;
  document.getElementById('hoursVal').textContent = getHours();
  document.getElementById('bestVal').textContent = bestStreak;
  document.getElementById('streakPill').textContent = days + 'h';

  document.getElementById('startLbl').textContent = startDate
    ? startDate.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}) : '—';

  const today = todayStr();
  const checked = checkedInDates.has(today);
  document.getElementById('ciDot').className = 'ci-dot' + (checked ? ' on' : '');
  document.getElementById('ciTxt').className = 'ci-txt' + (checked ? ' on' : '');
  document.getElementById('ciTxt').textContent = checked ? 'Sudah check in ✓' : 'Belum check in hari ini';
  const cb = document.getElementById('ciBtn');
  cb.className = 'ci-btn ' + (checked ? 'done' : 'go');
  cb.textContent = checked ? 'Done ✓' : '✓ Check In';

  renderCal();
  renderNext(days);
  renderMs(days);
  checkToast(days);
}

const LABELS = ['Sen','Sel','Rab','Kam','Jum','Sab','Min'];

function renderCal() {
  document.getElementById('calLabels').innerHTML = LABELS.map(l=>`<div class="cl">${l}</div>`).join('');
  view === 'week' ? renderWeek() : renderMonth();
}

function renderWeek() {
  const today = new Date(); today.setHours(0,0,0,0);
  const dow = (today.getDay()+6)%7;
  const mon = new Date(today); mon.setDate(today.getDate()-dow);
  const msDays = getMilestoneDays();
  let h = '';
  for (let i=0;i<7;i++) {
    const d = new Date(mon); d.setDate(mon.getDate()+i);
    const dstr = ds(d);
    const isToday = dstr === todayStr();
    const inChain = isChainDay(dstr);
    const isFuture = d > today;
    const isMs = msDays.has(dstr) && inChain;
    let cls = 'cc in';
    if (inChain) cls += ' chain';
    if (isMs) cls += ' ms-day';
    if (isToday) cls += ' today';
    if (isFuture) cls += ' fut';
    h += `<div class="${cls}">${!inChain ? d.getDate() : ''}</div>`;
  }
  document.getElementById('calGrid').innerHTML = h;
}

function renderMonth() {
  const yr = calMonth.getFullYear(), mo = calMonth.getMonth();
  document.getElementById('monthLbl').textContent =
    calMonth.toLocaleDateString('id-ID',{month:'long',year:'numeric'}).toUpperCase();
  const today = new Date(); today.setHours(0,0,0,0);
  const firstDay = new Date(yr,mo,1);
  const off = (firstDay.getDay()+6)%7;
  const dim = new Date(yr,mo+1,0).getDate();
  const prev = new Date(yr,mo,0).getDate();
  const msDays = getMilestoneDays();
  let h = '';
  for (let i=0;i<off;i++) h += `<div class="cc dim">${prev-off+i+1}</div>`;
  for (let d=1;d<=dim;d++) {
    const cd = new Date(yr,mo,d);
    const dstr = ds(cd);
    const isToday = dstr===todayStr();
    const inChain = isChainDay(dstr);
    const isFuture = cd>today;
    const isMs = msDays.has(dstr) && inChain;
    let cls='cc in';
    if (inChain) cls+=' chain';
    if (isMs) cls+=' ms-day';
    if (isToday) cls+=' today';
    if (isFuture) cls+=' fut';
    h += `<div class="${cls}">${!inChain ? d : ''}</div>`;
  }
  const total = off+dim, rem = total%7===0?0:7-(total%7);
  for (let d=1;d<=rem;d++) h += `<div class="cc dim">${d}</div>`;
  document.getElementById('calGrid').innerHTML = h;
}

function renderNext(days) {
  const next = MILESTONES.find(m=>m.days>days);
  if (!next) {
    document.getElementById('nmsName').textContent='🌟 Semua milestone tercapai!';
    document.getElementById('nmsDays').textContent='';
    document.getElementById('nmsFill').style.width='100%';
    return;
  }
  const prev = [...MILESTONES].reverse().find(m=>m.days<=days);
  const from = prev?prev.days:0;
  const pct = Math.round(((days-from)/(next.days-from))*100);
  document.getElementById('nmsName').textContent=`${next.badge} ${next.title}`;
  document.getElementById('nmsDays').textContent=`${next.days-days} hari lagi`;
  document.getElementById('nmsFill').style.width=Math.min(100,pct)+'%';
}

function renderMs(days) {
  const next = MILESTONES.find(m=>m.days>days);
  document.getElementById('msList').innerHTML = MILESTONES.map(m=>{
    const done=days>=m.days, isNext=next&&next.days===m.days;
    return `<div class="ms-item${done?' done':''}${isNext?' next':''}">
      <div class="ms-ico">${m.badge}</div>
      <div class="ms-txt"><div class="ms-t">${m.title}</div><div class="ms-d">${m.desc}</div></div>
      <div class="ms-n">${m.days}h</div>
      <div class="ms-ck ${done?'y':'n'}">${done?'✓':''}</div>
    </div>`;
  }).join('');
}

function checkToast(days) {
  const hit = MILESTONES.find(m=>m.days===days&&!shownMilestones.has(m.days));
  if (hit) { shownMilestones.add(hit.days); save(); showToast(hit.badge,`${hit.title} tercapai!`); }
}

function doCheckIn() {
  const today = todayStr();
  if (checkedInDates.has(today)) return;
  checkedInDates.add(today);
  if (!startDate) { startDate=new Date(); startDate.setHours(0,0,0,0); }
  save(); renderAll();
  showToast('✓','Check in berhasil! Keep going.');
}

function setView(v) {
  view = v;
  document.getElementById('togWeek').className='tog'+(v==='week'?' on':'');
  document.getElementById('togMonth').className='tog'+(v==='month'?' on':'');
  document.getElementById('monthNav').className='month-nav'+(v==='month'?' show':'');
  calMonth = new Date();
  renderCal();
}

function changeMonth(d) { calMonth.setMonth(calMonth.getMonth()+d); renderCal(); }

function openModal() {
  if (startDate) return;
  document.getElementById('dateInput').value = ds(new Date());
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function saveDate() {
  const v = document.getElementById('dateInput').value; if (!v) return;
  startDate=new Date(v); startDate.setHours(0,0,0,0);
  save(); closeModal(); renderAll();
}

document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeModal();});

let tTimer;
function showToast(ico,msg) {
  clearTimeout(tTimer);
  document.getElementById('tIco').textContent=ico;
  document.getElementById('tMsg').textContent=msg;
  const t=document.getElementById('toast');
  t.classList.add('show');
  tTimer=setTimeout(()=>t.classList.remove('show'),3200);
}

document.getElementById('quoteEl').textContent=QUOTES[Math.floor(Math.random()*QUOTES.length)];

load(); renderAll();
if (!startDate) setTimeout(openModal,700);
setInterval(renderAll,60000);
</script>
</body>
</html>
